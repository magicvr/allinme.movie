<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分类映射 – AllInMe Movie</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-900 shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="text-red-500 font-bold text-xl tracking-wide shrink-0">AllInMe Movie</a>
      <a href="/admin" class="text-gray-400 text-sm hover:text-white transition-colors">管理后台</a>
      <span class="text-gray-600">/</span>
      <span class="text-gray-200 text-sm">分类映射</span>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-semibold mb-2 text-gray-200">分类映射管理</h1>
    <p class="text-sm text-gray-400 mb-8">将采集源中的远程分类绑定到本地标准分类，绑定后首页导航栏将显示对应分类。</p>

    <!-- Add local category -->
    <section class="bg-gray-900 rounded-xl p-6 mb-8 max-w-lg">
      <h2 class="text-lg font-semibold mb-3 text-gray-100">新增本地分类</h2>
      <div class="flex gap-3">
        <input
          id="new-cat-name"
          type="text"
          placeholder="分类名称（如：纪录片）"
          class="flex-1 rounded-lg bg-gray-800 border border-gray-700 px-4 py-2 text-sm focus:outline-none focus:border-red-500"
        />
        <button
          onclick="createCategory()"
          class="rounded-lg bg-red-600 hover:bg-red-700 px-5 py-2 text-sm font-semibold transition-colors"
        >添加</button>
      </div>
      <p id="cat-status" class="mt-2 text-sm hidden"></p>
    </section>

    <!-- Mapping table -->
    <section class="bg-gray-900 rounded-xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-100">远程分类列表</h2>
        <button
          id="save-btn"
          onclick="saveMappings()"
          class="rounded-lg bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed px-5 py-2 text-sm font-semibold transition-colors"
        >保存映射</button>
      </div>
      <p id="save-status" class="mb-4 text-sm hidden"></p>

      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="text-gray-400 border-b border-gray-700">
              <th class="pb-3 pr-6">采集源</th>
              <th class="pb-3 pr-6">远程分类ID</th>
              <th class="pb-3 pr-6">远程分类名称</th>
              <th class="pb-3">本地分类</th>
            </tr>
          </thead>
          <tbody id="map-table-body">
            <tr>
              <td colspan="4" class="py-8 text-center text-gray-500">加载中…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    var allMaps = [];
    var allCategories = [];
    var sourceNames = {};

    function loadData() {
      Promise.all([
        fetch('/api/admin/category-maps').then(function(r){ return r.json(); }),
        fetch('/admin/categories').then(function(r){ return r.json(); }),
        fetch('/admin/collection-sources').then(function(r){ return r.json(); })
      ]).then(function(results) {
        allMaps = results[0] || [];
        allCategories = results[1] || [];
        var sources = results[2] || [];
        sources.forEach(function(s){ sourceNames[s.id] = s.name; });
        renderTable();
      }).catch(function(err) {
        document.getElementById('map-table-body').innerHTML =
          '<tr><td colspan="4" class="py-8 text-center text-red-400">加载失败：' + err.message + '</td></tr>';
      });
    }

    function renderTable() {
      var tbody = document.getElementById('map-table-body');
      if (!allMaps.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-gray-500">暂无远程分类，请先执行一次数据采集。</td></tr>';
        return;
      }
      var optionsHtml = '<option value="0">-- 未绑定 --</option>';
      allCategories.forEach(function(cat) {
        optionsHtml += '<option value="' + cat.id + '">' + cat.name + '</option>';
      });
      var html = '';
      allMaps.forEach(function(m) {
        var srcName = sourceNames[m.source_id] || ('来源 #' + m.source_id);
        html += '<tr class="border-b border-gray-800 hover:bg-gray-800/40">';
        html += '<td class="py-3 pr-6 text-gray-300">' + escHtml(srcName) + '</td>';
        html += '<td class="py-3 pr-6 text-gray-400">' + escHtml(m.remote_type_id) + '</td>';
        html += '<td class="py-3 pr-6">' + escHtml(m.remote_name || '—') + '</td>';
        html += '<td class="py-3"><select data-map-id="' + m.id + '" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-red-500">' + optionsHtml + '</select></td>';
        html += '</tr>';
      });
      tbody.innerHTML = html;
      // Set current selections
      allMaps.forEach(function(m) {
        var sel = tbody.querySelector('select[data-map-id="' + m.id + '"]');
        if (sel) sel.value = m.local_category_id || 0;
      });
    }

    function saveMappings() {
      var selects = document.querySelectorAll('#map-table-body select');
      var updates = [];
      selects.forEach(function(sel) {
        updates.push({ id: parseInt(sel.dataset.mapId, 10), local_category_id: parseInt(sel.value, 10) });
      });
      var btn = document.getElementById('save-btn');
      var status = document.getElementById('save-status');
      btn.disabled = true;
      fetch('/api/admin/category-maps', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates)
      }).then(function(r) {
        if (r.status === 204) {
          status.className = 'mb-4 text-sm text-green-400';
          status.textContent = '保存成功！';
          btn.disabled = false;
        } else {
          return r.text().then(function(t) {
            status.className = 'mb-4 text-sm text-red-400';
            status.textContent = '保存失败：' + t;
            btn.disabled = false;
          });
        }
      }).catch(function(err) {
        status.className = 'mb-4 text-sm text-red-400';
        status.textContent = '网络错误：' + err.message;
        btn.disabled = false;
      });
    }

    function createCategory() {
      var input = document.getElementById('new-cat-name');
      var name = input.value.trim();
      var status = document.getElementById('cat-status');
      if (!name) {
        status.className = 'mt-2 text-sm text-red-400';
        status.textContent = '请输入分类名称。';
        return;
      }
      fetch('/admin/categories', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, enabled: true })
      }).then(function(r) {
        if (r.status === 201) {
          input.value = '';
          status.className = 'mt-2 text-sm text-green-400';
          status.textContent = '分类 "' + name + '" 已创建。';
          loadData();
        } else {
          return r.text().then(function(t) {
            status.className = 'mt-2 text-sm text-red-400';
            status.textContent = '创建失败：' + t;
          });
        }
      }).catch(function(err) {
        status.className = 'mt-2 text-sm text-red-400';
        status.textContent = '网络错误：' + err.message;
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadData();
  </script>
</body>
</html>
