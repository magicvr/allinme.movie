<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 – {{.SiteTitle}}</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/logo.png" />
  <link rel="apple-touch-icon" href="/static/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-900 shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="flex items-center gap-3 shrink-0">
        <img src="/static/logo.png" alt="{{.SiteTitle}}" class="w-10 h-10 rounded" />
        <span class="text-red-500 font-bold text-xl tracking-wide">{{.SiteTitle}}</span>
      </a>
      <span class="text-gray-400 text-sm">管理后台</span>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-semibold mb-8 text-gray-200">管理后台</h1>

    <!-- Sync section -->
    <section class="bg-gray-900 rounded-xl p-6 max-w-md">
      <h2 class="text-lg font-semibold mb-2 text-gray-100">数据采集</h2>
      <p class="text-sm text-gray-400 mb-5">手动触发一次完整的影片采集与同步，采集任务将在后台异步执行。</p>

      <button
        id="sync-btn"
        onclick="triggerSync()"
        class="inline-flex items-center gap-2 rounded-lg bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed px-5 py-2.5 text-sm font-semibold transition-colors"
      >
        <svg id="sync-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582M20 20v-5h-.581M5.535 9A8 8 0 0 1 19.938 13M18.465 15A8 8 0 0 1 4.062 11" />
        </svg>
        立即同步
      </button>

      <p id="sync-status" class="mt-3 text-sm hidden" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    function triggerSync() {
      var btn = document.getElementById('sync-btn');
      var status = document.getElementById('sync-status');

      btn.disabled = true;
      status.className = 'mt-3 text-sm text-gray-400';
      status.textContent = '正在提交同步请求…';

      fetch('/admin/sync', { method: 'POST' })
        .then(function (res) {
          if (res.status === 202) {
            status.className = 'mt-3 text-sm text-green-400';
            status.textContent = '采集任务已启动，正在后台运行。';
            setTimeout(function () { btn.disabled = false; }, 5000);
          } else if (res.status === 409) {
            status.className = 'mt-3 text-sm text-yellow-400';
            status.textContent = '已有采集任务正在运行，请稍候再试。';
            btn.disabled = false;
          } else if (res.status === 503) {
            status.className = 'mt-3 text-sm text-red-400';
            status.textContent = '采集器未配置，请检查服务端设置。';
            btn.disabled = false;
          } else {
            return res.text().then(function (msg) {
              status.className = 'mt-3 text-sm text-red-400';
              status.textContent = '请求失败：' + msg;
              btn.disabled = false;
            });
          }
        })
        .catch(function (err) {
          status.className = 'mt-3 text-sm text-red-400';
          status.textContent = '网络错误：' + err.message;
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
