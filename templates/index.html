<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllInMe Movie</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-900 shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="text-red-500 font-bold text-xl tracking-wide shrink-0">AllInMe Movie</a>
      <form method="GET" action="/search" class="flex flex-1 max-w-xl">
        <input
          type="search"
          name="q"
          value="{{.Query}}"
          placeholder="搜索影片…"
          class="flex-1 rounded-l-full bg-gray-800 border border-gray-700 px-4 py-2 text-sm focus:outline-none focus:border-red-500"
        />
        <button
          type="submit"
          class="rounded-r-full bg-red-600 hover:bg-red-700 px-5 py-2 text-sm font-semibold transition-colors"
        >搜索</button>
      </form>
    </div>
    <!-- Category nav row (populated by JS) -->
    <div id="cat-nav" class="hidden max-w-7xl mx-auto px-4 pb-2 flex flex-wrap gap-2"></div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 py-8">

    <!-- Recently watched (rendered by JS from localStorage) -->
    <section id="watch-history-section" class="hidden mb-10">
      <h2 class="text-xl font-semibold mb-4 text-gray-200">最近看过</h2>
      <div id="watch-history-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
    </section>

    {{if .Query}}
    <h2 class="text-xl font-semibold mb-6 text-gray-200">
      搜索结果：<span class="text-white">{{.Query}}</span>
      <span class="text-gray-400 text-base font-normal ml-2">({{len .Movies}} 部)</span>
    </h2>
    {{else}}
    <h2 class="text-xl font-semibold mb-6 text-gray-200">最近更新</h2>
    {{end}}

    {{if .Movies}}
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      {{range .Movies}}
      <a href="/movie/{{.ID}}" class="group block rounded-lg overflow-hidden bg-gray-800 hover:ring-2 hover:ring-red-500 transition-all duration-200">
        {{if .Poster}}
        <img
          src="{{.Poster}}"
          alt="{{.Title}}"
          loading="lazy"
          class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition-transform duration-300"
        />
        {{else}}
        <div class="w-full aspect-[2/3] bg-gray-700 flex items-center justify-center">
          <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 4v16M17 4v16M3 8h18M3 16h18" />
          </svg>
        </div>
        {{end}}
        <div class="p-2">
          <p class="text-sm font-medium truncate leading-snug">{{.Title}}</p>
          {{if .Year}}<p class="text-xs text-gray-400 mt-0.5">{{.Year}}{{if .Area}} · {{.Area}}{{end}}</p>{{end}}
        </div>
      </a>
      {{end}}
    </div>
    {{else}}
    <div class="flex flex-col items-center justify-center py-24 text-gray-500">
      <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
      </svg>
      <p class="text-lg">暂无影片</p>
    </div>
    {{end}}

  </main>
  <script>
    (function () {
      var HISTORY_KEY = 'allinme_watch_history';
      var raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return;
      var list;
      try { list = JSON.parse(raw); } catch (e) { return; }
      if (!list || !list.length) return;

      var section = document.getElementById('watch-history-section');
      var grid = document.getElementById('watch-history-grid');
      list.forEach(function (item) {
        var a = document.createElement('a');
        a.href = '/movie/' + item.id;
        a.className = 'group block rounded-lg overflow-hidden bg-gray-800 hover:ring-2 hover:ring-red-500 transition-all duration-200';
        if (item.poster) {
          var img = document.createElement('img');
          img.src = item.poster;
          img.alt = item.title;
          img.loading = 'lazy';
          img.className = 'w-full aspect-[2/3] object-cover group-hover:scale-105 transition-transform duration-300';
          a.appendChild(img);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'w-full aspect-[2/3] bg-gray-700 flex items-center justify-center';
          placeholder.innerHTML = '<svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 4v16M17 4v16M3 8h18M3 16h18"/></svg>';
          a.appendChild(placeholder);
        }
        var info = document.createElement('div');
        info.className = 'p-2';
        var title = document.createElement('p');
        title.className = 'text-sm font-medium truncate leading-snug';
        title.textContent = item.title;
        info.appendChild(title);
        if (item.sourceKey) {
          var sub = document.createElement('p');
          sub.className = 'text-xs text-gray-400 mt-0.5 truncate';
          sub.textContent = item.sourceKey;
          info.appendChild(sub);
        }
        a.appendChild(info);
        grid.appendChild(a);
      });
      section.classList.remove('hidden');
    })();
  </script>
  <script>
    // Load enabled categories for the nav bar.
    (function () {
      fetch('/api/categories')
        .then(function (r) { return r.json(); })
        .then(function (cats) {
          if (!cats || !cats.length) return;
          var nav = document.getElementById('cat-nav');
          var params = new URLSearchParams(window.location.search);
          var activeCatID = params.get('category_id') || '';

          var allLink = document.createElement('a');
          allLink.href = '/';
          allLink.textContent = '全部';
          allLink.className = 'px-3 py-1 rounded-full text-xs font-medium transition-colors ' +
            (!activeCatID ? 'bg-red-600 text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700');
          nav.appendChild(allLink);

          cats.forEach(function (cat) {
            var a = document.createElement('a');
            a.href = '/?category_id=' + cat.id;
            a.textContent = cat.name;
            var isActive = activeCatID === String(cat.id);
            a.className = 'px-3 py-1 rounded-full text-xs font-medium transition-colors ' +
              (isActive ? 'bg-red-600 text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700');
            nav.appendChild(a);
          });
          nav.classList.remove('hidden');
        })
        .catch(function (err) {
          console.error('Failed to load categories:', err);
          /* silently ignore – categories nav is optional */
        });
    })();
  </script>
</body>
</html>
